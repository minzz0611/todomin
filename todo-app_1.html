<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>할일</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="할일">
  <meta name="theme-color" content="#4f46e5">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pri:#4f46e5;--pri-l:#ede9fe;--pri-d:#3730a3;
      --bg:#f5f5f7;--sf:#ffffff;--bd:#e5e7eb;
      --tx:#111827;--tx2:#6b7280;
      --hi:#ef4444;--md:#f59e0b;--lo:#9ca3af;
      --hi-bg:#fef2f2;--md-bg:#fffbeb;--lo-bg:#f9fafb;
      --sw:250px;--r:14px;
      --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
      --sh2:0 4px 16px rgba(0,0,0,.12);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0f0f14;--sf:#1c1c24;--bd:#2d2d3a;
        --tx:#f0f0fa;--tx2:#6b7280;--pri-l:#1e1b4b;
        --hi-bg:#2d1515;--md-bg:#2d2000;--lo-bg:#1c1c24;
      }
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
    #app{display:flex;height:100dvh}

    /* SIDEBAR */
    .sidebar{width:var(--sw);flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 24px}
    .sb-head{padding:22px 16px 14px}
    .sb-logo{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--pri)}
    .sb-section{padding:16px 10px 4px}
    .sb-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);padding:0 8px 6px}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--tx);transition:background .12s;user-select:none}
    .nav-item:hover{background:var(--bg)}
    .nav-item.active{background:var(--pri-l);color:var(--pri);font-weight:700}
    .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
    .nb{margin-left:auto;background:var(--pri);color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:999px;min-width:18px;text-align:center}
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .add-cat-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--tx2);background:none;border:none;width:100%;text-align:left;transition:all .12s;font-family:inherit}
    .add-cat-btn:hover{color:var(--pri);background:var(--bg)}

    /* MAIN */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{padding:20px 22px 0;background:var(--bg)}
    .tb-title{font-size:28px;font-weight:800;letter-spacing:-.5px}
    .tb-date{font-size:13px;color:var(--tx2);margin-top:3px}
    .search-wrap{margin-top:14px;display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:11px;padding:10px 14px;box-shadow:var(--sh)}
    .search-wrap input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--tx);font-family:inherit}
    .search-wrap input::placeholder{color:var(--tx2)}
    .filter-row{display:flex;gap:6px;padding:12px 22px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .filter-row::-webkit-scrollbar{display:none}
    .chip{padding:5px 13px;border-radius:999px;border:1px solid var(--bd);background:var(--sf);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--tx2);transition:all .12s;box-shadow:var(--sh)}
    .chip.on{background:var(--pri);border-color:var(--pri);color:#fff}

    /* TODO LIST */
    .todo-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 22px 90px}
    .sec-head{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.05em;display:flex;align-items:center;gap:8px;padding:12px 0 6px}
    .sec-line{flex:1;height:1px;background:var(--bd)}
    .todo-card{display:flex;align-items:flex-start;gap:11px;padding:13px 14px 13px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;box-shadow:var(--sh)}
    .todo-card:hover{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l)}
    .todo-card.done{opacity:.45}
    .pbar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r) 0 0 var(--r)}
    .p-high .pbar{background:var(--hi)}
    .p-med .pbar{background:var(--md)}
    .p-low .pbar{background:var(--lo)}
    .chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
    .chk:hover{border-color:var(--pri)}
    .chk.on{background:var(--pri);border-color:var(--pri)}
    .chk.on::after{content:'✓';color:#fff;font-size:11px;font-weight:800}
    .card-body{flex:1;min-width:0}
    .card-title{font-size:15px;font-weight:600;line-height:1.4;color:var(--tx)}
    .done .card-title{text-decoration:line-through;color:var(--tx2)}
    .card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
    .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
    .tag-cat{background:var(--pri-l);color:var(--pri)}
    .tag-hi{background:var(--hi-bg);color:var(--hi)}
    .tag-md{background:var(--md-bg);color:var(--md)}
    .tag-lo{background:var(--lo-bg);color:var(--lo)}
    .tag-date{font-size:11px;font-weight:500;color:var(--tx2);display:flex;align-items:center;gap:3px}
    .tag-date.over{color:var(--hi);font-weight:700}
    .tag-date.tod{color:var(--md);font-weight:700}

    /* FAB */
    .fab{position:fixed;bottom:28px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--pri);color:#fff;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,70,229,.45);transition:transform .15s,box-shadow .15s;z-index:80;line-height:1}
    .fab:hover{transform:scale(1.07)}
    .fab:active{transform:scale(.93)}

    /* BOTTOM NAV */
    .bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom);z-index:70}
    .bnav-inner{display:flex;justify-content:space-around}
    .bn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;cursor:pointer;color:var(--tx2);font-size:10px;font-weight:600;transition:color .12s;min-width:54px}
    .bn.on{color:var(--pri)}
    .bn-icon{font-size:20px;line-height:1}

    /* MODALS */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
    .overlay.open{opacity:1;pointer-events:all}
    @media(min-width:640px){.overlay{align-items:center}}
    .sheet{background:var(--sf);border-radius:22px 22px 0 0;padding:24px 22px;width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;transform:translateY(30px);opacity:0;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .25s}
    @media(min-width:640px){.sheet{border-radius:22px;transform:scale(.96);max-height:85dvh}}
    .overlay.open .sheet{transform:translateY(0);opacity:1}
    @media(min-width:640px){.overlay.open .sheet{transform:scale(1)}}
    .sheet-handle{width:36px;height:4px;background:var(--bd);border-radius:999px;margin:0 auto 20px}
    @media(min-width:640px){.sheet-handle{display:none}}
    .sheet-title{font-size:18px;font-weight:800;margin-bottom:18px;color:var(--tx)}
    .field{margin-bottom:15px}
    .field label{font-size:12px;font-weight:700;color:var(--tx2);display:block;margin-bottom:6px;letter-spacing:.03em}
    .inp{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;color:var(--tx);outline:none;background:var(--bg);font-family:inherit;transition:border-color .15s}
    .inp:focus{border-color:var(--pri)}
    .inp.ta{resize:none;height:72px}
    .pri-row{display:flex;gap:7px}
    .pri-opt{flex:1;padding:10px 6px;text-align:center;border:2px solid var(--bd);border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--tx2);transition:all .13s}
    .pri-opt[data-v="high"].s{border-color:var(--hi);background:var(--hi-bg);color:var(--hi)}
    .pri-opt[data-v="med"].s{border-color:var(--md);background:var(--md-bg);color:var(--md)}
    .pri-opt[data-v="low"].s{border-color:var(--lo);background:var(--lo-bg);color:var(--lo)}
    .cat-row{display:flex;flex-wrap:wrap;gap:7px}
    .cat-opt{padding:6px 13px;border:1.5px solid var(--bd);border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);transition:all .13s}
    .cat-opt.s{border-color:var(--pri);background:var(--pri-l);color:var(--pri)}
    .btn-row{display:flex;gap:9px;margin-top:22px}
    .btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .13s;font-family:inherit}
    .btn-p{background:var(--pri);color:#fff}
    .btn-p:hover{background:var(--pri-d)}
    .btn-s{background:var(--bg);color:var(--tx);border:1.5px solid var(--bd)}
    .btn-d{background:var(--hi-bg);color:var(--hi);border:1.5px solid #fecaca}
    .color-row{display:flex;gap:9px;flex-wrap:wrap}
    .c-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .13s,border-color .13s}
    .c-dot.s{transform:scale(1.15)}
    .empty{text-align:center;padding:60px 20px;color:var(--tx2)}
    .empty-emoji{font-size:44px;margin-bottom:14px}
    .empty p{font-size:15px}
    .more-link{text-align:center;padding:10px;font-size:13px;color:var(--tx2);cursor:pointer;border-radius:10px;transition:background .12s}
    .more-link:hover{background:var(--bg)}

    @media(max-width:640px){
      .sidebar{display:none}
      .bnav{display:block}
      .topbar{padding:16px 16px 0}
      .filter-row{padding:10px 16px 0}
      .todo-list{padding:10px 16px 100px}
      .fab{bottom:calc(env(safe-area-inset-bottom) + 66px);right:16px}
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ──────── 상수 ────────
const COLORS = ['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
const DEFAULT_CATS = [
  {id:'work',     name:'업무', color:'#4f46e5'},
  {id:'personal', name:'개인', color:'#10b981'},
  {id:'health',   name:'건강', color:'#f59e0b'},
];
const LS_TODOS = 'minzz_todos';
const LS_CATS  = 'minzz_cats';

// ──────── 상태 ────────
let S = {
  todos: [],
  cats: [...DEFAULT_CATS],
  view: 'today',
  priFilter: 'all',
  q: '',
  showDone: false,
};

// ──────── localStorage 저장/불러오기 ────────
function loadData() {
  try {
    const t = localStorage.getItem(LS_TODOS);
    const c = localStorage.getItem(LS_CATS);
    if (t) S.todos = JSON.parse(t);
    if (c) S.cats  = JSON.parse(c);
  } catch(e) {}
}

function persist() {
  localStorage.setItem(LS_TODOS, JSON.stringify(S.todos));
  localStorage.setItem(LS_CATS,  JSON.stringify(S.cats));
}

// ──────── CRUD ────────
function saveTodo(t) {
  if (t.id) {
    const i = S.todos.findIndex(x => x.id === t.id);
    if (i >= 0) S.todos[i] = {...S.todos[i], ...t};
  } else {
    S.todos.unshift({...t, id: 'td_' + Date.now(), completed: false, createdAt: Date.now()});
  }
  persist();
}

function delTodo(id) {
  S.todos = S.todos.filter(t => t.id !== id);
  persist();
}

function toggleTodo(id) {
  const t = S.todos.find(x => x.id === id);
  if (t) { t.completed = !t.completed; persist(); render(); }
}

// ──────── 날짜 헬퍼 ────────
const now     = () => new Date();
const todayEnd  = () => { const d=new Date(); d.setHours(23,59,59,999); return d; };
const weekEnd   = () => { const d=now(),day=d.getDay(),diff=day===0?0:7-day; d.setDate(d.getDate()+diff); d.setHours(23,59,59,999); return d; };
const monthEnd  = () => { const d=new Date(); d.setMonth(d.getMonth()+1,0); d.setHours(23,59,59,999); return d; };
const todayStr  = () => now().toISOString().split('T')[0];

function fmtDate(iso) {
  if (!iso) return null;
  const d   = new Date(iso + 'T23:59:59');
  const ms  = d - new Date().setHours(0,0,0,0);
  const days = Math.floor(ms / 86400000);
  if (days < 0)  return { txt: `${-days}일 전 마감`, cls: 'over' };
  if (days === 0) return { txt: '오늘 마감', cls: 'tod' };
  if (days === 1) return { txt: '내일', cls: '' };
  if (days < 7)  return { txt: d.toLocaleDateString('ko-KR',{weekday:'short'})+' 마감', cls:'' };
  return { txt: d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'}), cls:'' };
}

// ──────── 필터링 ────────
function inView(todo, view) {
  if (!todo.dueDate && view !== 'all' && !view.startsWith('cat_')) return false;
  const d = todo.dueDate ? new Date(todo.dueDate+'T23:59:59') : null;
  if (view === 'today') return d && d <= todayEnd();
  if (view === 'week')  return d && d <= weekEnd();
  if (view === 'month') return d && d <= monthEnd();
  if (view.startsWith('cat_')) return todo.category === view.slice(4);
  return true;
}

function getVisible() {
  return S.todos.filter(t => {
    if (!inView(t, S.view)) return false;
    if (S.priFilter !== 'all' && t.priority !== S.priFilter) return false;
    if (S.q && !t.title.toLowerCase().includes(S.q.toLowerCase())) return false;
    return true;
  });
}

function countView(view) {
  return S.todos.filter(t => !t.completed && inView(t, view)).length;
}

// ──────── HTML 헬퍼 ────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const priLabel = p => p==='high'?'🔴 높음':p==='med'?'🟡 중간':'⚪ 낮음';
const priTagCls = p => p==='high'?'tag-hi':p==='med'?'tag-md':'tag-lo';
const priCardCls = p => p==='high'?'p-high':p==='med'?'p-med':'p-low';

// ──────── RENDER ────────
function render() {
  document.getElementById('app').innerHTML = renderMain();
  afterRender();
}

function renderMain() {
  const vm = {today:{label:'오늘',icon:'📅'},week:{label:'이번 주',icon:'📆'},month:{label:'이번 달',icon:'🗓️'},all:{label:'전체',icon:'📋'}};
  const title = S.view.startsWith('cat_') ? (S.cats.find(c=>c.id===S.view.slice(4))?.name||'카테고리') : (vm[S.view]?.label||'할일');
  const visible = getVisible();
  const active  = visible.filter(t => !t.completed);
  const done    = visible.filter(t =>  t.completed);

  const navViews = ['today','week','month','all'].map(v => {
    const n = countView(v);
    return `<div class="nav-item${S.view===v?' active':''}" onclick="setView('${v}')">
      <span class="nav-icon">${vm[v].icon}</span><span>${vm[v].label}</span>
      ${n?`<span class="nb">${n}</span>`:''}
    </div>`;
  }).join('');

  const navCats = S.cats.map(c => {
    const v = 'cat_'+c.id, n = countView(v);
    return `<div class="nav-item${S.view===v?' active':''}" onclick="setView('${v}')">
      <span class="cat-dot" style="background:${c.color}"></span><span>${esc(c.name)}</span>
      ${n?`<span class="nb">${n}</span>`:''}
    </div>`;
  }).join('');

  const card = t => {
    const cat = S.cats.find(c => c.id === t.category);
    const dt  = fmtDate(t.dueDate);
    return `<div class="todo-card ${priCardCls(t.priority)}${t.completed?' done':''}" onclick="openEdit('${t.id}')">
      <div class="pbar"></div>
      <div class="chk${t.completed?' on':''}" onclick="event.stopPropagation();toggleTodo('${t.id}')"></div>
      <div class="card-body">
        <div class="card-title">${esc(t.title)}</div>
        <div class="card-meta">
          ${cat?`<span class="tag tag-cat">${esc(cat.name)}</span>`:''}
          <span class="tag ${priTagCls(t.priority)}">${priLabel(t.priority)}</span>
          ${dt?`<span class="tag-date ${dt.cls}">📅 ${dt.txt}</span>`:''}
        </div>
      </div>
    </div>`;
  };

  const listHTML = (() => {
    if (!active.length && !done.length) return `<div class="empty"><div class="empty-emoji">🎉</div><p>할일이 없습니다!</p></div>`;
    let h = active.map(card).join('');
    if (S.showDone && done.length) {
      h += `<div class="sec-head">완료됨 (${done.length})<div class="sec-line"></div></div>` + done.map(card).join('');
    } else if (!S.showDone && done.length) {
      h += `<div class="more-link" onclick="S.showDone=true;render()">완료된 항목 ${done.length}개 보기 ▾</div>`;
    }
    return h;
  })();

  const catSelOpts = S.cats.map(c => `<span class="cat-opt" data-c="${c.id}" onclick="selCat('${c.id}')">${esc(c.name)}</span>`).join('');
  const colorDots  = COLORS.map(col => `<div class="c-dot" data-col="${col}" style="background:${col}" onclick="selColor('${col}')"></div>`).join('');
  const catMenuItems = S.cats.map(c => {
    const v = 'cat_'+c.id, n = countView(v);
    return `<div class="nav-item" onclick="setView('${v}');closeM('catMenu')">
      <span class="cat-dot" style="background:${c.color}"></span><span>${esc(c.name)}</span>
      ${n?`<span class="nb">${n}</span>`:''}
    </div>`;
  }).join('');

  return `
  <div id="app" style="display:flex;height:100dvh">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-head"><div class="sb-logo">✅ 할일</div></div>
      <div class="sb-section">
        <div class="sb-label">보기</div>${navViews}
      </div>
      <div class="sb-section">
        <div class="sb-label">카테고리</div>${navCats}
        <button class="add-cat-btn" onclick="openM('catAdd')">＋ 카테고리 추가</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="tb-title">${title}</div>
        <div class="tb-date">${now().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div>
        <div class="search-wrap">
          <span>🔍</span>
          <input type="text" placeholder="검색..." value="${esc(S.q)}" oninput="S.q=this.value;render()">
        </div>
      </div>
      <div class="filter-row">
        <span class="chip${S.priFilter==='all'?' on':''}" onclick="setPri('all')">전체</span>
        <span class="chip${S.priFilter==='high'?' on':''}" onclick="setPri('high')">🔴 높음</span>
        <span class="chip${S.priFilter==='med'?' on':''}" onclick="setPri('med')">🟡 중간</span>
        <span class="chip${S.priFilter==='low'?' on':''}" onclick="setPri('low')">⚪ 낮음</span>
      </div>
      <div class="todo-list" id="todo-list">${listHTML}</div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openAdd()">＋</button>

  <!-- BOTTOM NAV -->
  <nav class="bnav">
    <div class="bnav-inner">
      ${['today','week','month','all'].map(v=>`<div class="bn${S.view===v?' on':''}" onclick="setView('${v}')"><span class="bn-icon">${vm[v].icon}</span>${vm[v].label}</div>`).join('')}
      <div class="bn" onclick="openM('catMenu')"><span class="bn-icon">🏷️</span>분류</div>
    </div>
  </nav>

  <!-- Modal: Add/Edit Todo -->
  <div class="overlay" id="todoM">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="mTitle">새 할일</div>
      <div class="field"><label>제목 *</label><input class="inp" id="mTitle_" type="text" placeholder="무엇을 해야 하나요?" maxlength="120"></div>
      <div class="field"><label>메모</label><textarea class="inp ta" id="mNotes" placeholder="추가 메모..."></textarea></div>
      <div class="field"><label>우선순위</label>
        <div class="pri-row">
          <div class="pri-opt" data-v="high" onclick="selPri('high')">🔴 높음</div>
          <div class="pri-opt" data-v="med"  onclick="selPri('med')">🟡 중간</div>
          <div class="pri-opt" data-v="low"  onclick="selPri('low')">⚪ 낮음</div>
        </div>
      </div>
      <div class="field"><label>카테고리</label>
        <div class="cat-row" id="catRow">
          <span class="cat-opt s" data-c="" onclick="selCat('')">없음</span>${catSelOpts}
        </div>
      </div>
      <div class="field"><label>마감일</label><input class="inp" id="mDue" type="date"></div>
      <div class="btn-row">
        <button class="btn btn-s" onclick="closeM('todoM')">취소</button>
        <button class="btn btn-d" id="mDel" style="display:none" onclick="doDelete()">삭제</button>
        <button class="btn btn-p" onclick="doSave()">저장</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Category -->
  <div class="overlay" id="catAdd">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">카테고리 추가</div>
      <div class="field"><label>이름</label><input class="inp" id="catName" type="text" placeholder="카테고리 이름" maxlength="20"></div>
      <div class="field"><label>색상</label><div class="color-row" id="colorRow">${colorDots}</div></div>
      <div class="btn-row">
        <button class="btn btn-s" onclick="closeM('catAdd')">취소</button>
        <button class="btn btn-p" onclick="doAddCat()">추가</button>
      </div>
    </div>
  </div>

  <!-- Modal: Category Menu (mobile) -->
  <div class="overlay" id="catMenu">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">카테고리</div>
      ${catMenuItems}
      <button class="add-cat-btn" onclick="closeM('catMenu');setTimeout(()=>openM('catAdd'),300)">＋ 카테고리 추가</button>
      <div class="btn-row"><button class="btn btn-s" onclick="closeM('catMenu')">닫기</button></div>
    </div>
  </div>`;
}

// ──────── Modal State ────────
let MS = {id:null, pri:'med', cat:'', color:'#4f46e5'};

function afterRender() {
  const first = document.querySelector('.c-dot');
  if (first) { first.classList.add('s'); first.style.borderColor='#4f46e5'; }
  document.querySelector(`.pri-opt[data-v="${MS.pri}"]`)?.classList.add('s');
  document.querySelectorAll('.cat-opt').forEach(e => e.classList.toggle('s', e.dataset.c === MS.cat));
}

function openM(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('open');
  el.addEventListener('click', e=>{ if(e.target===el) closeM(id); }, {once:true});
}
function closeM(id) { document.getElementById(id)?.classList.remove('open'); }

function openAdd() {
  MS = {id:null, pri:'med', cat:'', color:'#4f46e5'};
  document.getElementById('mTitle').textContent = '새 할일';
  document.getElementById('mTitle_').value = '';
  document.getElementById('mNotes').value = '';
  document.getElementById('mDue').value = todayStr();
  document.getElementById('mDel').style.display = 'none';
  document.querySelectorAll('.pri-opt').forEach(e => e.classList.toggle('s', e.dataset.v==='med'));
  document.querySelectorAll('.cat-opt').forEach(e => e.classList.toggle('s', e.dataset.c===''));
  openM('todoM');
  setTimeout(() => document.getElementById('mTitle_').focus(), 320);
}

function openEdit(id) {
  const t = S.todos.find(x => x.id === id);
  if (!t) return;
  MS = {id, pri:t.priority||'med', cat:t.category||'', color:'#4f46e5'};
  document.getElementById('mTitle').textContent = '할일 수정';
  document.getElementById('mTitle_').value = t.title;
  document.getElementById('mNotes').value = t.notes||'';
  document.getElementById('mDue').value = t.dueDate||'';
  document.getElementById('mDel').style.display = 'block';
  document.querySelectorAll('.pri-opt').forEach(e => e.classList.toggle('s', e.dataset.v===MS.pri));
  document.querySelectorAll('.cat-opt').forEach(e => e.classList.toggle('s', e.dataset.c===MS.cat));
  openM('todoM');
}

function selPri(p) {
  MS.pri = p;
  document.querySelectorAll('.pri-opt').forEach(e => e.classList.toggle('s', e.dataset.v===p));
}
function selCat(c) {
  MS.cat = c;
  document.querySelectorAll('.cat-opt').forEach(e => e.classList.toggle('s', e.dataset.c===c));
}
function selColor(col) {
  MS.color = col;
  document.querySelectorAll('.c-dot').forEach(e => {
    e.classList.toggle('s', e.dataset.col===col);
    e.style.borderColor = e.dataset.col===col ? col : 'transparent';
  });
}

function doSave() {
  const title = document.getElementById('mTitle_').value.trim();
  if (!title) { document.getElementById('mTitle_').focus(); return; }
  saveTodo({
    id: MS.id,
    title,
    notes:    document.getElementById('mNotes').value.trim(),
    priority: MS.pri,
    category: MS.cat||null,
    dueDate:  document.getElementById('mDue').value||null,
  });
  closeM('todoM');
  render();
}

function doDelete() {
  if (!MS.id || !confirm('정말 삭제하시겠어요?')) return;
  delTodo(MS.id);
  closeM('todoM');
  render();
}

function doAddCat() {
  const name = document.getElementById('catName').value.trim();
  if (!name) { document.getElementById('catName').focus(); return; }
  S.cats.push({id:'c'+Date.now(), name, color:MS.color});
  persist();
  closeM('catAdd');
  render();
}

function setView(v) { S.view=v; S.showDone=false; render(); }
function setPri(p)  { S.priFilter=p; render(); }

// ──────── 시작 ────────
loadData();
render();
</script>
</body>
</html>
