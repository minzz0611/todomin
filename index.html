<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FAFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="루틴">
<title>루틴 — 할일 &amp; 습관</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#FAFAF7;
    --surface:#FFFFFF;
    --ink:#20231F;
    --ink-soft:#6B6F68;
    --ink-faint:#A6A89F;
    --sage:#4C7A66;
    --sage-light:#E3EDE7;
    --coral:#C9633C;
    --coral-light:#F5E4DC;
    --border:#E8E6DE;
    --radius:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;}
  body{
    min-height:100vh;
    min-height:100dvh;
    overscroll-behavior-y:contain;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  header.top{
    padding:max(20px, env(safe-area-inset-top)) 20px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .greeting .date{font-size:13px;color:var(--ink-soft);margin-bottom:2px;}
  .greeting h1{font-size:20px;font-weight:600;margin:0;}
  .ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-wrap .pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;color:var(--sage);
  }
  main{flex:1;padding:0 20px 100px;overflow-y:auto;}
  .section-title{
    font-size:13px;font-weight:600;color:var(--ink-soft);
    margin:20px 0 10px;letter-spacing:0.02em;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:4px;
    margin-bottom:14px;
  }
  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--ink-faint);
    font-size:14px;
    line-height:1.7;
  }
  /* todo item */
  .todo-item{
    display:flex;align-items:center;gap:12px;
    padding:14px 12px;
    border-bottom:1px solid var(--border);
  }
  .todo-item:last-child{border-bottom:none;}
  .check{
    width:22px;height:22px;border-radius:50%;
    border:1.5px solid var(--ink-faint);
    flex-shrink:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
    background:transparent;
  }
  .check.done{background:var(--sage);border-color:var(--sage);}
  .check svg{width:12px;height:12px;opacity:0;transition:opacity .15s;}
  .check.done svg{opacity:1;}
  .todo-text{flex:1;font-size:15px;line-height:1.5;}
  .todo-text.done{color:var(--ink-faint);text-decoration:line-through;}
  .del-btn{
    background:none;border:none;color:var(--ink-faint);
    font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;
  }
  /* habit item */
  .habit-item{
    padding:16px 14px;
    border-bottom:1px solid var(--border);
  }
  .habit-item:last-child{border-bottom:none;}
  .habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .habit-name{font-size:15px;font-weight:500;}
  .habit-streak{
    font-size:12px;color:var(--coral);font-weight:600;
    display:flex;align-items:center;gap:3px;
  }
  .habit-dots{display:flex;gap:6px;align-items:center;}
  .dot-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
  .dot{
    width:100%;aspect-ratio:1;border-radius:8px;
    background:var(--bg);border:1px solid var(--border);
    cursor:pointer;max-width:34px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .dot.filled{background:var(--sage);border-color:var(--sage);}
  .dot.today{box-shadow:0 0 0 2px var(--coral-light);}
  .dot-label{font-size:10px;color:var(--ink-faint);}
  .habit-del{
    background:none;border:none;color:var(--ink-faint);font-size:13px;cursor:pointer;
  }
  /* add bar */
  .add-bar{
    display:flex;gap:8px;padding:14px;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:16px;
  }
  .add-bar input{
    flex:1;border:none;outline:none;font-size:15px;
    font-family:inherit;background:transparent;color:var(--ink);
  }
  .add-bar input::placeholder{color:var(--ink-faint);}
  .add-btn{
    background:var(--ink);color:var(--bg);border:none;
    width:32px;height:32px;border-radius:50%;
    font-size:18px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .add-btn:active{transform:scale(0.92);}
  /* bottom nav */
  nav.bottom{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:var(--surface);
    border-top:1px solid var(--border);
    padding:8px 12px max(8px, env(safe-area-inset-bottom));
    display:flex;justify-content:space-around;
  }
  .nav-btn{
    background:none;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:6px 18px;color:var(--ink-faint);font-size:11px;
    font-family:inherit;
  }
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn.active{color:var(--sage);}
  .today-block{margin-bottom:6px;}
  .today-sub{font-size:12px;color:var(--ink-soft);margin:0 0 8px 2px;}
  /* login screen */
  #loginScreen{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;padding:24px;z-index:100;
  }
  #loginScreen .logo{
    width:64px;height:64px;border-radius:18px;background:var(--sage);
    display:flex;align-items:center;justify-content:center;
  }
  #loginScreen .logo svg{width:30px;height:30px;stroke:white;}
  #loginScreen h2{font-size:19px;font-weight:600;margin:0;}
  #loginScreen p{font-size:14px;color:var(--ink-soft);margin:0;text-align:center;line-height:1.6;}
  .google-btn{
    display:flex;align-items:center;gap:10px;
    background:var(--surface);border:1px solid var(--border);
    padding:12px 24px;border-radius:var(--radius-sm);
    font-family:inherit;font-size:15px;font-weight:500;color:var(--ink);
    cursor:pointer;
  }
  .google-btn:active{transform:scale(0.98);}
  .google-btn img{width:18px;height:18px;}
  .user-bar{
    display:flex;justify-content:flex-end;align-items:center;gap:10px;
    padding:0 20px 8px;font-size:12px;color:var(--ink-faint);
  }
  .user-bar button{
    background:none;border:none;color:var(--ink-faint);font-size:12px;
    cursor:pointer;text-decoration:underline;padding:0;font-family:inherit;
  }
  .sync-dot{
    width:6px;height:6px;border-radius:50%;background:var(--sage);flex-shrink:0;
  }
</style>
</head>
<body>
<div id="loginScreen">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M12 21s-7-4.5-9.5-9C.5 8 2 4 6 4c2.2 0 3.8 1.3 4.8 2.5"/><path d="M12 21s7-4.5 9.5-9C23.5 8 22 4 18 4c-2.2 0-3.8 1.3-4.8 2.5"/><path d="M12 6.5V21"/></svg>
  </div>
  <div>
    <h2 style="text-align:center;">루틴</h2>
    <p>구글 계정으로 로그인하면<br>폰과 PC에서 같은 기록을 볼 수 있어요.</p>
  </div>
  <button class="google-btn" onclick="loginWithGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
    구글로 로그인
  </button>
</div>

<div id="app" style="display:none;">
  <header class="top">
    <div class="greeting">
      <div class="date" id="todayDate"></div>
      <h1 id="greetingText">오늘도 가볍게</h1>
    </div>
    <div class="ring-wrap">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="22" fill="none" stroke="#E8E6DE" stroke-width="5"/>
        <circle id="ringProgress" cx="26" cy="26" r="22" fill="none" stroke="#4C7A66" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
      </svg>
      <div class="pct" id="ringPct">0%</div>
    </div>
  </header>

  <div class="user-bar">
    <span class="sync-dot" id="syncDot"></span>
    <span id="userEmail"></span>
    <button onclick="logout()">로그아웃</button>
  </div>

  <main id="mainContent"></main>

  <nav class="bottom">
    <button class="nav-btn active" data-tab="today" onclick="switchTab('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="4"/></svg>
      오늘
    </button>
    <button class="nav-btn" data-tab="todo" onclick="switchTab('todo')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12l2.5 2.5L16 9"/></svg>
      할일
    </button>
    <button class="nav-btn" data-tab="habit" onclick="switchTab('habit')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-9.5-9C.5 8 2 4 6 4c2.2 0 3.8 1.3 4.8 2.5"/><path d="M12 21s7-4.5 9.5-9C23.5 8 22 4 18 4c-2.2 0-3.8 1.3-4.8 2.5"/><path d="M12 6.5V21"/></svg>
      습관
    </button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDc8aIcu18x2n7U-0U13s5ZP3DI6FLzqrY",
  authDomain: "side-817ad.firebaseapp.com",
  projectId: "side-817ad",
  storageBucket: "side-817ad.firebasestorage.app",
  messagingSenderId: "984693118386",
  appId: "1:984693118386:web:1025139bec0135cdea40ab",
  measurementId: "G-51WJDS24PC"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

let currentUser = null;
let unsubscribeSnapshot = null;
let isRemoteUpdate = false;

async function loginWithGoogle(){
  try{
    await signInWithPopup(auth, new GoogleAuthProvider());
  }catch(e){
    alert('로그인에 실패했어요. 다시 시도해주세요.');
    console.error(e);
  }
}

async function logout(){
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  await signOut(auth);
}

function userDocRef(uid){
  return doc(db, 'users', uid);
}

async function startSync(user){
  currentUser = user;
  document.getElementById('userEmail').textContent = user.email || '';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = '';

  const ref = userDocRef(user.uid);
  try{
    const snap = await getDoc(ref);

    if(!snap.exists()){
      // 첫 로그인: 이 기기에 남아있던 로컬 데이터가 있으면 그대로 옮겨줌
      const localTodos = JSON.parse(localStorage.getItem('routine_todos') || '[]');
      const localHabits = JSON.parse(localStorage.getItem('routine_habits') || '[]');
      todos = localTodos;
      habits = localHabits;
      await setDoc(ref, { todos, habits });
    } else {
      const data = snap.data();
      todos = data.todos || [];
      habits = data.habits || [];
    }
    render();
  }catch(e){
    console.error('동기화 초기 로드 실패', e);
    alert('데이터를 불러오는 데 실패했어요: ' + e.message);
  }

  unsubscribeSnapshot = onSnapshot(ref, (docSnap) => {
    if(!docSnap.exists()) return;
    isRemoteUpdate = true;
    const data = docSnap.data();
    todos = data.todos || [];
    habits = data.habits || [];
    render();
    flashSync();
  }, (error) => {
    console.error('실시간 동기화 오류', error);
    alert('실시간 동기화에 문제가 생겼어요: ' + error.message);
  });
}

function flashSync(){
  const dot = document.getElementById('syncDot');
  if(!dot) return;
  dot.style.background = 'var(--coral)';
  setTimeout(() => { dot.style.background = 'var(--sage)'; }, 400);
}

async function saveData(){
  if(!currentUser) return;
  if(isRemoteUpdate){ isRemoteUpdate = false; return; } // 방금 받은 원격 데이터는 다시 쓰지 않음
  await setDoc(userDocRef(currentUser.uid), { todos, habits });
}

onAuthStateChanged(auth, (user) => {
  if(user){
    startSync(user);
  } else {
    currentUser = null;
    if(unsubscribeSnapshot) unsubscribeSnapshot();
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

/* ---------- 데이터 ---------- */
const todayStr = () => new Date().toISOString().slice(0,10);

let todos = [];
let habits = [];
let currentTab = 'today';

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function last7Dates(){
  const arr = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    arr.push(d.toISOString().slice(0,10));
  }
  return arr;
}

function calcStreak(habit){
  let streak = 0;
  let d = new Date();
  while(true){
    const key = d.toISOString().slice(0,10);
    if(habit.history[key]){
      streak++;
      d.setDate(d.getDate()-1);
    } else {
      if(key === todayStr()) { d.setDate(d.getDate()-1); continue; }
      break;
    }
  }
  return streak;
}

/* ---------- 렌더 ---------- */
const weekdayLabels = ['일','월','화','수','목','금','토'];

function setHeader(){
  const now = new Date();
  document.getElementById('todayDate').textContent =
    `${now.getMonth()+1}월 ${now.getDate()}일 ${weekdayLabels[now.getDay()]}요일`;
  const hour = now.getHours();
  const greet = hour < 11 ? '좋은 아침이에요' : hour < 18 ? '오늘도 가볍게' : '하루를 마무리해요';
  document.getElementById('greetingText').textContent = greet;
}

function updateRing(){
  const todayHabits = habits.length;
  const doneHabits = habits.filter(h => h.history[todayStr()]).length;
  const todosTotal = todos.length;
  const todosDone = todos.filter(t => t.done).length;
  const total = todayHabits + todosTotal;
  const done = doneHabits + todosDone;
  const pct = total === 0 ? 0 : Math.round((done/total)*100);
  const circumference = 138.2;
  const offset = circumference - (circumference * pct / 100);
  document.getElementById('ringProgress').style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';
}

function render(){
  setHeader();
  updateRing();
  const main = document.getElementById('mainContent');
  if(currentTab === 'today') main.innerHTML = renderToday();
  if(currentTab === 'todo') main.innerHTML = renderTodo();
  if(currentTab === 'habit') main.innerHTML = renderHabit();
}

function renderToday(){
  const pendingTodos = todos.filter(t => !t.done);
  const doneTodos = todos.filter(t => t.done);
  let html = '';

  html += `<div class="today-block"><div class="section-title">할일</div>`;
  if(pendingTodos.length === 0 && doneTodos.length === 0){
    html += `<div class="card"><div class="empty">오늘 할 일이 없어요.<br>할일 탭에서 추가해보세요.</div></div>`;
  } else {
    html += `<div class="card">`;
    pendingTodos.forEach(t => html += todoItemHtml(t));
    doneTodos.forEach(t => html += todoItemHtml(t));
    html += `</div>`;
  }
  html += `</div>`;

  html += `<div class="today-block"><div class="section-title">습관</div>`;
  if(habits.length === 0){
    html += `<div class="card"><div class="empty">아직 등록한 습관이 없어요.<br>습관 탭에서 추가해보세요.</div></div>`;
  } else {
    html += `<div class="card">`;
    habits.forEach(h => {
      const done = !!h.history[todayStr()];
      html += `
        <div class="todo-item">
          <div class="check ${done?'done':''}" onclick="toggleHabitToday('${h.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
          </div>
          <div class="todo-text ${done?'done':''}">${escapeHtml(h.name)}</div>
          <div class="habit-streak">🔥 ${calcStreak(h)}</div>
        </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  return html;
}

function todoItemHtml(t){
  return `
    <div class="todo-item">
      <div class="check ${t.done?'done':''}" onclick="toggleTodo('${t.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <div class="todo-text ${t.done?'done':''}">${escapeHtml(t.text)}</div>
      <button class="del-btn" onclick="deleteTodo('${t.id}')">×</button>
    </div>`;
}

function renderTodo(){
  let html = `
    <div class="add-bar">
      <input id="todoInput" placeholder="할 일을 입력하세요" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="add-btn" onclick="addTodo()">+</button>
    </div>`;
  if(todos.length === 0){
    html += `<div class="card"><div class="empty">할 일을 추가해보세요.</div></div>`;
  } else {
    const pending = todos.filter(t=>!t.done);
    const done = todos.filter(t=>t.done);
    html += `<div class="card">`;
    pending.forEach(t => html += todoItemHtml(t));
    done.forEach(t => html += todoItemHtml(t));
    html += `</div>`;
  }
  return html;
}

function renderHabit(){
  let html = `
    <div class="add-bar">
      <input id="habitInput" placeholder="새 습관 이름 (예: 물 마시기)" onkeydown="if(event.key==='Enter')addHabit()">
      <button class="add-btn" onclick="addHabit()">+</button>
    </div>`;
  if(habits.length === 0){
    html += `<div class="card"><div class="empty">습관을 추가하면<br>최근 7일 기록이 여기에 보여요.</div></div>`;
  } else {
    const dates = last7Dates();
    html += `<div class="card">`;
    habits.forEach(h => {
      html += `
        <div class="habit-item">
          <div class="habit-top">
            <div class="habit-name">${escapeHtml(h.name)}</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="habit-streak">🔥 ${calcStreak(h)}일</div>
              <button class="habit-del" onclick="deleteHabit('${h.id}')">삭제</button>
            </div>
          </div>
          <div class="habit-dots">
            ${dates.map(d => {
              const isToday = d === todayStr();
              const filled = !!h.history[d];
              const day = weekdayLabels[new Date(d).getDay()];
              return `
                <div class="dot-wrap">
                  <div class="dot ${filled?'filled':''} ${isToday?'today':''}" onclick="toggleHabitDate('${h.id}','${d}')"></div>
                  <div class="dot-label">${day}</div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- 액션 ---------- */
function addTodo(){
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if(!text) return;
  todos.unshift({id: uid(), text, done:false, createdAt: Date.now()});
  saveData();
  input.value='';
  render();
}
function toggleTodo(id){
  const t = todos.find(t=>t.id===id);
  if(t){ t.done = !t.done; saveData(); render(); }
}
function deleteTodo(id){
  todos = todos.filter(t=>t.id!==id);
  saveData();
  render();
}

function addHabit(){
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if(!name) return;
  habits.push({id: uid(), name, history:{}, createdAt: Date.now()});
  saveData();
  input.value='';
  render();
}
function toggleHabitDate(id, date){
  const h = habits.find(h=>h.id===id);
  if(!h) return;
  if(h.history[date]) delete h.history[date];
  else h.history[date] = true;
  saveData();
  render();
}
function toggleHabitToday(id){
  toggleHabitDate(id, todayStr());
}
function deleteHabit(id){
  habits = habits.filter(h=>h.id!==id);
  saveData();
  render();
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  render();
}

/* ---------- 초기화 ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* module 스코프라 onclick에서 쓰려면 window에 노출해야 함 */
window.loginWithGoogle = loginWithGoogle;
window.logout = logout;
window.addTodo = addTodo;
window.toggleTodo = toggleTodo;
window.deleteTodo = deleteTodo;
window.addHabit = addHabit;
window.toggleHabitDate = toggleHabitDate;
window.toggleHabitToday = toggleHabitToday;
window.deleteHabit = deleteHabit;
window.switchTab = switchTab;
</script>
